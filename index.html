<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Carousel · Cover & Content View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .pdf-carousel {
            max-width: 960px;
            width: 100%;
            background: #fcfcfd;
            border-radius: 40px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.25), 0 8px 20px rgba(0, 0, 0, 0.04);
            padding: 2rem 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .drop-zone {
            background: #f2f7ff;
            border: 3px dashed #b8cae0;
            border-radius: 32px;
            padding: 2.4rem 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .drop-zone.dragover {
            border-color: #1f3a66;
            background: #e3edfc;
            transform: scale(1.01);
            box-shadow: 0 0 0 4px rgba(31, 58, 102, 0.08);
        }

        .drop-zone i {
            font-size: 3.2rem;
            color: #1f3a66;
            margin-bottom: 0.5rem;
            display: block;
        }

        .drop-zone h3 {
            font-weight: 500;
            color: #0b1a2b;
            font-size: 1.3rem;
        }

        .drop-zone p {
            color: #4d637e;
            font-size: 0.95rem;
            margin-top: 0.2rem;
        }

        .drop-zone .browse-btn {
            background: #1f3a66;
            color: white;
            border: none;
            padding: 0.55rem 2rem;
            border-radius: 60px;
            font-weight: 500;
            margin-top: 1rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-block;
            pointer-events: auto;
        }

        .drop-zone .browse-btn:hover {
            background: #142b4a;
            transform: scale(1.02);
        }

        #fileInput {
            display: none;
        }

        .drop-zone .file-status {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #1f3a66;
            font-weight: 450;
            background: #eaf0f8;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
        }

        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d0d7e2;
            padding-bottom: 0.8rem;
            margin-bottom: 1.6rem;
            flex-wrap: wrap;
        }

        .pdf-header h2 {
            font-weight: 500;
            font-size: 1.2rem;
            color: #1f2a3e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pdf-header h2 i {
            color: #2d4b7c;
        }

        .page-indicator {
            background: #eef2f7;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1f2a3e;
        }

        .carousel-viewport {
            overflow: hidden;
            border-radius: 24px;
            background: #f8f9fc;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 1.5rem;
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: center;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            will-change: transform;
            width: 100%;
        }

        .slide {
            flex: 0 0 100%;
            padding: 2rem;
            background: #f8f9fc;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        /* Cover & Content layout */
        .pair-container {
            display: flex;
            flex-direction: row;
            gap: 2rem;
            width: 100%;
            max-width: 850px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cover-container {
            flex: 1;
            min-width: 200px;
            max-width: 350px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .cover-container:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .cover-container canvas {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 2px solid #d0d7e2;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            display: block;
            background: white;
        }

        .cover-label {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(31, 58, 102, 0.85);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .content-container {
            flex: 2;
            min-width: 280px;
            max-width: 550px;
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8edf4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-container canvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            background: white;
        }

        .content-container .page-label {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: #4d637e;
            background: #f0f4fc;
            padding: 0.2rem 1.2rem;
            border-radius: 30px;
            font-weight: 500;
        }

        .content-container .click-hint {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #889bb3;
        }

        .content-container .click-hint i {
            margin-right: 4px;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 420px;
            color: #6f85a2;
            padding: 1.5rem;
            text-align: center;
        }

        .empty-state i {
            font-size: 4rem;
            color: #b8cae0;
            margin-bottom: 0.8rem;
        }

        .empty-state h4 {
            font-weight: 400;
            color: #2b405d;
        }

        .empty-state p {
            color: #889bb3;
            font-size: 0.9rem;
        }

        /* Controls */
        .carousel-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.8rem;
            margin: 0.4rem 0 0.2rem;
        }

        .carousel-controls button {
            background: #f0f4fc;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            font-size: 1.3rem;
            color: #1f3a66;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid #d9e2ef;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-controls button:hover:not(:disabled) {
            background: #1f3a66;
            color: white;
            border-color: #1f3a66;
            transform: scale(1.03);
            box-shadow: 0 8px 16px rgba(28, 49, 79, 0.15);
        }

        .carousel-controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .carousel-controls .dots {
            display: flex;
            gap: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 20px;
            background: #ccd7e6;
            transition: all 0.25s;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .dot.active {
            background: #1f3a66;
            width: 26px;
        }

        .dot:hover {
            background: #6f89b0;
        }

        .pdf-footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #66758b;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .pdf-footer i {
            margin: 0 4px;
        }

        .file-info {
            background: #eef3fa;
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-size: 0.8rem;
            color: #1f3a66;
        }

        @media (max-width: 700px) {
            .pair-container {
                flex-direction: column;
                align-items: center;
            }
            .cover-container {
                max-width: 280px;
                width: 100%;
            }
            .content-container {
                max-width: 100%;
                width: 100%;
            }
            .pdf-carousel {
                padding: 1.2rem 1rem;
            }
            .slide {
                padding: 1rem;
                min-height: 320px;
            }
            .drop-zone {
                padding: 1.8rem 1rem;
            }
            .carousel-controls button {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .carousel-viewport {
                min-height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="pdf-carousel">

        <!-- DRAG & DROP ZONE -->
        <div class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Drop your PDF here</h3>
            <p>or click to browse — pages paired as cover + content</p>
            <button class="browse-btn" id="browseBtn"><i class="fas fa-folder-open"></i> Choose PDF</button>
            <input type="file" id="fileInput" accept=".pdf,application/pdf">
            <div class="file-status" id="fileStatus">📄 no file loaded</div>
        </div>

        <!-- header -->
        <div class="pdf-header">
            <h2><i class="fas fa-layer-group"></i> Cover & Content Carousel</h2>
            <span class="page-indicator" id="pageIndicator">0 / 0</span>
        </div>

        <!-- carousel viewport -->
        <div class="carousel-viewport" id="carouselViewport">
            <div class="carousel-track" id="carouselTrack">
                <div class="slide empty-state" id="emptySlide">
                    <i class="fas fa-file-pdf"></i>
                    <h4>Drop a PDF to extract pages</h4>
                    <p>Odd pages = covers · Even pages = content</p>
                    <p style="font-size:0.8rem; margin-top:0.5rem; color:#889bb3;">Click the cover to reveal the content</p>
                </div>
            </div>
        </div>

        <!-- controls -->
        <div class="carousel-controls">
            <button id="prevBtn" disabled><i class="fas fa-chevron-left"></i></button>
            <div class="dots" id="dotsContainer"></div>
            <button id="nextBtn" disabled><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="pdf-footer">
            <span><i class="fas fa-print"></i> PDF carousel · cover + content view</span>
            <span class="file-info" id="fileInfo"><i class="far fa-file-pdf"></i> no PDF</span>
        </div>
    </div>

    <script>
        (function() {
            // ----- elements -----
            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('dotsContainer');
            const pageIndicator = document.getElementById('pageIndicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const browseBtn = document.getElementById('browseBtn');
            const fileStatus = document.getElementById('fileStatus');
            const fileInfo = document.getElementById('fileInfo');
            const viewport = document.getElementById('carouselViewport');

            // ----- state -----
            let currentIndex = 0;
            let totalSlides = 0;
            let isTransitioning = false;
            let pdfDoc = null;
            let isRendering = false;
            let pageData = []; // Store page canvases and data

            // PDF.js worker
            const pdfjsLib = window.pdfjsLib;
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            // ----- update UI -----
            function updateUI() {
                dotsContainer.innerHTML = '';
                for (let i = 0; i < totalSlides; i++) {
                    const dot = document.createElement('button');
                    dot.className = `dot ${i === currentIndex ? 'active' : ''}`;
                    dot.setAttribute('data-index', i);
                    dot.setAttribute('aria-label', `Pair ${i+1}`);
                    dot.addEventListener('click', () => goToSlide(i));
                    dotsContainer.appendChild(dot);
                }
                pageIndicator.textContent = totalSlides > 0 ? `${currentIndex + 1} / ${totalSlides}` : '0 / 0';
                prevBtn.disabled = totalSlides === 0 || currentIndex === 0;
                nextBtn.disabled = totalSlides === 0 || currentIndex === totalSlides - 1;
            }

            // ----- go to slide -----
            function goToSlide(index) {
                if (isTransitioning || totalSlides === 0 || isRendering) return;
                if (index < 0) index = totalSlides - 1;
                if (index >= totalSlides) index = 0;
                if (index === currentIndex) return;
                isTransitioning = true;
                currentIndex = index;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateUI();
                setTimeout(() => { isTransitioning = false; }, 400);
            }

            // ----- toggle content visibility on a slide -----
            function toggleContent(slideElement) {
                const contentContainer = slideElement.querySelector('.content-container');
                if (contentContainer) {
                    const isHidden = contentContainer.style.display === 'none';
                    contentContainer.style.display = isHidden ? 'flex' : 'none';
                    // Update hint text
                    const hint = slideElement.querySelector('.click-hint');
                    if (hint) {
                        hint.textContent = isHidden ? '👁️ Click cover to hide' : '👆 Click cover to view';
                    }
                }
            }

            // ----- render PDF pages -----
            async function renderPDFPages(arrayBuffer) {
                if (isRendering) return;
                isRendering = true;

                try {
                    fileStatus.textContent = '⏳ Processing PDF...';

                    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const totalPages = pdfDoc.numPages;

                    if (totalPages === 0) {
                        throw new Error('PDF has no pages');
                    }

                    // Clear track
                    while (track.firstChild) {
                        track.removeChild(track.firstChild);
                    }

                    pageData = [];
                    const maxWidth = 700;

                    // First, render all pages to canvases
                    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                        const page = await pdfDoc.getPage(pageNum);
                        const viewport = page.getViewport({ scale: 1.0 });
                        const scale = Math.min(1.8, maxWidth / viewport.width);
                        const scaledViewport = page.getViewport({ scale: scale });

                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = scaledViewport.width;
                        canvas.height = scaledViewport.height;

                        await page.render({
                            canvasContext: context,
                            viewport: scaledViewport
                        }).promise;

                        pageData.push({
                            canvas: canvas,
                            width: scaledViewport.width,
                            height: scaledViewport.height,
                            pageNum: pageNum
                        });
                    }

                    // Group pages into pairs (odd = cover, even = content)
                    const pairs = [];
                    for (let i = 0; i < pageData.length; i += 2) {
                        const cover = pageData[i];
                        const content = pageData[i + 1] || null; // If odd number of pages, last has no content
                        pairs.push({ cover, content });
                    }

                    totalSlides = pairs.length;

                    // Create slides for each pair
                    pairs.forEach((pair, pairIndex) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';
                        slide.style.display = 'flex';
                        slide.style.flexDirection = 'column';
                        slide.style.alignItems = 'center';
                        slide.style.justifyContent = 'center';
                        slide.style.padding = '1.5rem';
                        slide.style.minHeight = '420px';
                        slide.style.width = '100%';

                        const container = document.createElement('div');
                        container.className = 'pair-container';

                        // Cover (odd page)
                        const coverDiv = document.createElement('div');
                        coverDiv.className = 'cover-container';
                        const coverCanvas = pair.cover.canvas.cloneNode(true);
                        coverCanvas.style.width = '100%';
                        coverCanvas.style.height = 'auto';
                        coverCanvas.style.display = 'block';
                        coverDiv.appendChild(coverCanvas);

                        const coverLabel = document.createElement('div');
                        coverLabel.className = 'cover-label';
                        coverLabel.textContent = `Cover ${Math.floor(pair.cover.pageNum / 2) + 1}`;
                        coverDiv.appendChild(coverLabel);

                        // Content (even page) - if exists
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'content-container';
                        contentDiv.style.display = 'flex';

                        if (pair.content) {
                            const contentCanvas = pair.content.canvas.cloneNode(true);
                            contentCanvas.style.width = '100%';
                            contentCanvas.style.height = 'auto';
                            contentCanvas.style.display = 'block';
                            contentDiv.appendChild(contentCanvas);

                            const label = document.createElement('div');
                            label.className = 'page-label';
                            label.textContent = `Page ${pair.content.pageNum}`;
                            contentDiv.appendChild(label);
                        } else {
                            // No content page (odd number of pages)
                            const placeholder = document.createElement('div');
                            placeholder.style.padding = '2rem';
                            placeholder.style.textAlign = 'center';
                            placeholder.style.color = '#889bb3';
                            placeholder.innerHTML = `
                                <i class="fas fa-eye-slash" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                                <p>No content page</p>
                            `;
                            contentDiv.appendChild(placeholder);
                        }

                        // Click hint
                        const hint = document.createElement('div');
                        hint.className = 'click-hint';
                        hint.innerHTML = '👆 Click cover to view';
                        contentDiv.appendChild(hint);

                        // Add click handler to cover to toggle content
                        coverDiv.addEventListener('click', () => {
                            toggleContent(slide);
                        });

                        container.appendChild(coverDiv);
                        container.appendChild(contentDiv);
                        slide.appendChild(container);
                        track.appendChild(slide);
                    });

                    // Reset position
                    currentIndex = 0;
                    track.style.transform = `translateX(0%)`;
                    updateUI();

                    const filename = fileInput.files[0]?.name || 'PDF';
                    fileInfo.innerHTML = `<i class="far fa-file-pdf"></i> ${filename} · ${totalSlides} pairs (${pageData.length} pages)`;
                    fileStatus.textContent = `✅ ${filename} (${pageData.length} pages, ${totalSlides} pairs)`;

                    prevBtn.disabled = true;
                    nextBtn.disabled = (totalSlides <= 1);

                } catch (error) {
                    console.error('PDF error:', error);
                    alert('Could not render PDF. Please try another file.\nError: ' + error.message);
                    resetToEmpty();
                } finally {
                    isRendering = false;
                }
            }

            // ----- reset to empty state -----
            function resetToEmpty() {
                while (track.firstChild) {
                    track.removeChild(track.firstChild);
                }
                const empty = document.createElement('div');
                empty.className = 'slide empty-state';
                empty.id = 'emptySlide';
                empty.innerHTML = `
                    <i class="fas fa-file-pdf"></i>
                    <h4>Drop a PDF to extract pages</h4>
                    <p>Odd pages = covers · Even pages = content</p>
                    <p style="font-size:0.8rem; margin-top:0.5rem; color:#889bb3;">Click the cover to reveal the content</p>
                `;
                track.appendChild(empty);
                totalSlides = 0;
                currentIndex = 0;
                pdfDoc = null;
                pageData = [];
                track.style.transform = `translateX(0%)`;
                updateUI();
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                fileInfo.innerHTML = `<i class="far fa-file-pdf"></i> no PDF`;
                fileStatus.textContent = '📄 no file loaded';
                isRendering = false;
            }

            // ----- handle file -----
            function handleFile(file) {
                if (!file) {
                    alert('No file selected.');
                    return;
                }

                if (file.type !== 'application/pdf') {
                    alert('Please select a valid PDF file. Selected: ' + file.type);
                    return;
                }

                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        await renderPDFPages(e.target.result);
                    } catch (error) {
                        console.error('Error in renderPDFPages:', error);
                        alert('Error rendering PDF: ' + error.message);
                        resetToEmpty();
                    }
                };
                reader.onerror = function() {
                    alert('Error reading file.');
                    resetToEmpty();
                };
                reader.readAsArrayBuffer(file);
            }

            // ----- EVENT LISTENERS -----

            browseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            dropZone.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) {
                    handleFile(fileInput.files[0]);
                }
                fileInput.value = '';
            });

            // Drag & Drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type === 'application/pdf') {
                    handleFile(files[0]);
                } else {
                    alert('Please drop a PDF file.');
                }
            });

            document.querySelector('.pdf-carousel').addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            document.querySelector('.pdf-carousel').addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });
            document.querySelector('.pdf-carousel').addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type === 'application/pdf') {
                    handleFile(files[0]);
                } else {
                    alert('Please drop a PDF file.');
                }
            });

            // Carousel controls
            prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
            nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (totalSlides === 0 || isRendering) return;
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    goToSlide(currentIndex - 1);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    goToSlide(currentIndex + 1);
                }
            });

            // Touch swipe
            let startX = 0,
                isSwiping = false;
            viewport.addEventListener('touchstart', (e) => {
                if (totalSlides === 0 || isRendering) return;
                startX = e.touches[0].clientX;
                isSwiping = true;
            }, { passive: true });
            viewport.addEventListener('touchend', (e) => {
                if (!isSwiping || totalSlides === 0 || isRendering) return;
                isSwiping = false;
                const endX = e.changedTouches[0].clientX;
                const diff = startX - endX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) goToSlide(currentIndex + 1);
                    else goToSlide(currentIndex - 1);
                }
            }, { passive: true });

            // Mouse drag
            let mouseDown = false,
                mouseStartX = 0;
            viewport.addEventListener('mousedown', (e) => {
                if (totalSlides === 0 || isRendering) return;
                mouseDown = true;
                mouseStartX = e.clientX;
                e.preventDefault();
            });
            viewport.addEventListener('mouseup', (e) => {
                if (!mouseDown || totalSlides === 0 || isRendering) return;
                mouseDown = false;
                const diff = mouseStartX - e.clientX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) goToSlide(currentIndex + 1);
                    else goToSlide(currentIndex - 1);
                }
            });
            viewport.addEventListener('mouseleave', () => { mouseDown = false; });

            // init
            resetToEmpty();
        })();
    </script>
</body>
</html>
