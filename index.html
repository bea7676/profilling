<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Carousel · Flip Book View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .pdf-carousel {
            max-width: 960px;
            width: 100%;
            background: #fcfcfd;
            border-radius: 40px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.25), 0 8px 20px rgba(0, 0, 0, 0.04);
            padding: 2rem 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .drop-zone {
            background: #f2f7ff;
            border: 3px dashed #b8cae0;
            border-radius: 32px;
            padding: 2.4rem 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .drop-zone.dragover {
            border-color: #1f3a66;
            background: #e3edfc;
            transform: scale(1.01);
            box-shadow: 0 0 0 4px rgba(31, 58, 102, 0.08);
        }

        .drop-zone i {
            font-size: 3.2rem;
            color: #1f3a66;
            margin-bottom: 0.5rem;
            display: block;
        }

        .drop-zone h3 {
            font-weight: 500;
            color: #0b1a2b;
            font-size: 1.3rem;
        }

        .drop-zone p {
            color: #4d637e;
            font-size: 0.95rem;
            margin-top: 0.2rem;
        }

        .drop-zone .browse-btn {
            background: #1f3a66;
            color: white;
            border: none;
            padding: 0.55rem 2rem;
            border-radius: 60px;
            font-weight: 500;
            margin-top: 1rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-block;
            pointer-events: auto;
        }

        .drop-zone .browse-btn:hover {
            background: #142b4a;
            transform: scale(1.02);
        }

        #fileInput {
            display: none;
        }

        .drop-zone .file-status {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #1f3a66;
            font-weight: 450;
            background: #eaf0f8;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
        }

        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d0d7e2;
            padding-bottom: 0.8rem;
            margin-bottom: 1.6rem;
            flex-wrap: wrap;
        }

        .pdf-header h2 {
            font-weight: 500;
            font-size: 1.2rem;
            color: #1f2a3e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pdf-header h2 i {
            color: #2d4b7c;
        }

        .page-indicator {
            background: #eef2f7;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1f2a3e;
        }

        .carousel-viewport {
            overflow: hidden;
            border-radius: 24px;
            background: #f8f9fc;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 1.5rem;
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: center;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
            will-change: transform;
            width: 100%;
        }

        .slide {
            flex: 0 0 100%;
            padding: 2rem;
            background: #f8f9fc;
            min-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .flip-card {
            width: 100%;
            max-width: 750px;
            height: 550px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 16px;
        }

        .flip-card.flipped {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8edf4;
            padding: 1.5rem;
        }

        .flip-card-front {
            background: linear-gradient(145deg, #ffffff, #f8faff);
        }

        .flip-card-back {
            transform: rotateY(180deg);
            background: #ffffff;
        }

        .flip-card-front canvas,
        .flip-card-back canvas {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            display: block;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            object-fit: contain;
        }

        .flip-card-front .page-label,
        .flip-card-back .page-label {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: #4d637e;
            background: #f0f4fc;
            padding: 0.2rem 1.2rem;
            border-radius: 30px;
            font-weight: 500;
        }

        .flip-card-front .flip-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(31, 58, 102, 0.85);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flip-card-back .back-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(100, 100, 100, 0.15);
            color: #4d637e;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flip-card-front .cover-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1f3a66;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 420px;
            color: #6f85a2;
            padding: 1.5rem;
            text-align: center;
        }

        .empty-state i {
            font-size: 4rem;
            color: #b8cae0;
            margin-bottom: 0.8rem;
        }

        .empty-state h4 {
            font-weight: 400;
            color: #2b405d;
        }

        .empty-state p {
            color: #889bb3;
            font-size: 0.9rem;
        }

        .carousel-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.8rem;
            margin: 0.4rem 0 0.2rem;
        }

        .carousel-controls button {
            background: #f0f4fc;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            font-size: 1.3rem;
            color: #1f3a66;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid #d9e2ef;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-controls button:hover:not(:disabled) {
            background: #1f3a66;
            color: white;
            border-color: #1f3a66;
            transform: scale(1.03);
            box-shadow: 0 8px 16px rgba(28, 49, 79, 0.15);
        }

        .carousel-controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .carousel-controls .dots {
            display: flex;
            gap: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 20px;
            background: #ccd7e6;
            transition: all 0.25s;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .dot.active {
            background: #1f3a66;
            width: 26px;
        }

        .dot:hover {
            background: #6f89b0;
        }

        .pdf-footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #66758b;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .pdf-footer i {
            margin: 0 4px;
        }

        .file-info {
            background: #eef3fa;
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-size: 0.8rem;
            color: #1f3a66;
        }

        @media (max-width: 700px) {
            .flip-card {
                height: 450px;
            }
            .pdf-carousel {
                padding: 1.2rem 1rem;
            }
            .slide {
                padding: 1rem;
                min-height: 350px;
            }
            .drop-zone {
                padding: 1.8rem 1rem;
            }
            .carousel-controls button {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .carousel-viewport {
                min-height: 380px;
            }
            .flip-card-front canvas,
            .flip-card-back canvas {
                max-height: 300px;
            }
            .flip-card-front .flip-hint,
            .flip-card-back .back-hint {
                font-size: 0.6rem;
                padding: 0.2rem 0.8rem;
                bottom: 12px;
                right: 12px;
            }
        }

        @media (max-width: 500px) {
            .flip-card {
                height: 370px;
            }
            .flip-card-front canvas,
            .flip-card-back canvas {
                max-height: 240px;
            }
        }
    </style>
</head>
<body>
    <div class="pdf-carousel">

        <div class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Drop your PDF here</h3>
            <p>or click to browse — each pair becomes a flip card</p>
            <button class="browse-btn" id="browseBtn"><i class="fas fa-folder-open"></i> Choose PDF</button>
            <input type="file" id="fileInput" accept=".pdf,application/pdf">
            <div class="file-status" id="fileStatus">📄 no file loaded</div>
        </div>

        <div class="pdf-header">
            <h2><i class="fas fa-layer-group"></i> Flip Book Carousel</h2>
            <span class="page-indicator" id="pageIndicator">0 / 0</span>
        </div>

        <div class="carousel-viewport" id="carouselViewport">
            <div class="carousel-track" id="carouselTrack">
                <div class="slide empty-state" id="emptySlide">
                    <i class="fas fa-file-pdf"></i>
                    <h4>Drop a PDF to create flip cards</h4>
                    <p>Odd pages = front · Even pages = back</p>
                    <p style="font-size:0.8rem; margin-top:0.5rem; color:#889bb3;">Click the card to flip it</p>
                </div>
            </div>
        </div>

        <div class="carousel-controls">
            <button id="prevBtn" disabled><i class="fas fa-chevron-left"></i></button>
            <div class="dots" id="dotsContainer"></div>
            <button id="nextBtn" disabled><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="pdf-footer">
            <span><i class="fas fa-print"></i> PDF flip book · cover + content</span>
            <span class="file-info" id="fileInfo"><i class="far fa-file-pdf"></i> no PDF</span>
        </div>
    </div>

    <script>
        (function() {
            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('dotsContainer');
            const pageIndicator = document.getElementById('pageIndicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const browseBtn = document.getElementById('browseBtn');
            const fileStatus = document.getElementById('fileStatus');
            const fileInfo = document.getElementById('fileInfo');
            const viewport = document.getElementById('carouselViewport');

            let currentIndex = 0;
            let totalSlides = 0;
            let isTransitioning = false;
            let isRendering = false;
            let pageData = [];

            const pdfjsLib = window.pdfjsLib;
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            function updateUI() {
                dotsContainer.innerHTML = '';
                for (let i = 0; i < totalSlides; i++) {
                    const dot = document.createElement('button');
                    dot.className = `dot ${i === currentIndex ? 'active' : ''}`;
                    dot.setAttribute('data-index', i);
                    dot.addEventListener('click', () => goToSlide(i));
                    dotsContainer.appendChild(dot);
                }
                pageIndicator.textContent = totalSlides > 0 ? `${currentIndex + 1} / ${totalSlides}` : '0 / 0';
                prevBtn.disabled = totalSlides === 0 || currentIndex === 0;
                nextBtn.disabled = totalSlides === 0 || currentIndex === totalSlides - 1;
            }

            function goToSlide(index) {
                if (isTransitioning || totalSlides === 0 || isRendering) return;
                if (index < 0) index = totalSlides - 1;
                if (index >= totalSlides) index = 0;
                if (index === currentIndex) return;
                isTransitioning = true;
                currentIndex = index;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateUI();
                setTimeout(() => { isTransitioning = false; }, 500);
            }

            async function renderPDFPages(arrayBuffer) {
                if (isRendering) return;
                isRendering = true;

                try {
                    fileStatus.textContent = '⏳ Processing PDF...';

                    const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const totalPages = pdfDoc.numPages;

                    if (totalPages === 0) {
                        throw new Error('PDF has no pages');
                    }

                    while (track.firstChild) {
                        track.removeChild(track.firstChild);
                    }

                    pageData = [];

                    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                        const page = await pdfDoc.getPage(pageNum);
                        const viewport = page.getViewport({ scale: 1.5 });
                        
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        await page.render({
                            canvasContext: context,
                            viewport: viewport
                        }).promise;

                        pageData.push({
                            canvas: canvas,
                            pageNum: pageNum
                        });
                    }

                    const pairs = [];
                    for (let i = 0; i < pageData.length; i += 2) {
                        const front = pageData[i];
                        const back = pageData[i + 1] || null;
                        pairs.push({ front, back });
                    }

                    totalSlides = pairs.length;

                    pairs.forEach((pair, pairIndex) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';

                        const flipCard = document.createElement('div');
                        flipCard.className = 'flip-card';

                        // FRONT
                        const frontDiv = document.createElement('div');
                        frontDiv.className = 'flip-card-front';

                        const coverBadge = document.createElement('div');
                        coverBadge.className = 'cover-badge';
                        coverBadge.textContent = `📖 ${Math.floor(pair.front.pageNum / 2) + 1}`;
                        frontDiv.appendChild(coverBadge);

                        // Use the canvas directly - don't clone
                        const frontCanvas = pair.front.canvas;
                        frontCanvas.style.maxWidth = '100%';
                        frontCanvas.style.maxHeight = '400px';
                        frontCanvas.style.width = 'auto';
                        frontCanvas.style.height = 'auto';
                        frontCanvas.style.display = 'block';
                        frontDiv.appendChild(frontCanvas);

                        const frontLabel = document.createElement('div');
                        frontLabel.className = 'page-label';
                        frontLabel.textContent = `Cover · Page ${pair.front.pageNum}`;
                        frontDiv.appendChild(frontLabel);

                        const flipHint = document.createElement('div');
                        flipHint.className = 'flip-hint';
                        flipHint.innerHTML = '<i class="fas fa-arrows-rotate"></i> Click to flip';
                        frontDiv.appendChild(flipHint);

                        // BACK
                        const backDiv = document.createElement('div');
                        backDiv.className = 'flip-card-back';

                        if (pair.back) {
                            const backCanvas = pair.back.canvas;
                            backCanvas.style.maxWidth = '100%';
                            backCanvas.style.maxHeight = '400px';
                            backCanvas.style.width = 'auto';
                            backCanvas.style.height = 'auto';
                            backCanvas.style.display = 'block';
                            backDiv.appendChild(backCanvas);

                            const backLabel = document.createElement('div');
                            backLabel.className = 'page-label';
                            backLabel.textContent = `Content · Page ${pair.back.pageNum}`;
                            backDiv.appendChild(backLabel);
                        } else {
                            const placeholder = document.createElement('div');
                            placeholder.style.padding = '2rem';
                            placeholder.style.textAlign = 'center';
                            placeholder.style.color = '#889bb3';
                            placeholder.innerHTML = `
                                <i class="fas fa-eye-slash" style="font-size:3rem; display:block; margin-bottom:0.5rem;"></i>
                                <p style="font-size:1.1rem;">No content page</p>
                                <p style="font-size:0.8rem;">This is the last page</p>
                            `;
                            backDiv.appendChild(placeholder);
                        }

                        const backHint = document.createElement('div');
                        backHint.className = 'back-hint';
                        backHint.innerHTML = '<i class="fas fa-undo"></i> Click to flip back';
                        backDiv.appendChild(backHint);

                        flipCard.appendChild(frontDiv);
                        flipCard.appendChild(backDiv);
                        slide.appendChild(flipCard);
                        track.appendChild(slide);

                        flipCard.addEventListener('click', function(e) {
                            e.stopPropagation();
                            this.classList.toggle('flipped');
                        });
                    });

                    currentIndex = 0;
                    track.style.transform = `translateX(0%)`;
                    updateUI();

                    const filename = fileInput.files[0]?.name || 'PDF';
                    fileInfo.innerHTML =
                        `<i class="far fa-file-pdf"></i> ${filename} · ${totalSlides} cards (${pageData.length} pages)`;
                    fileStatus.textContent = `✅ ${filename} (${pageData.length} pages, ${totalSlides} cards)`;

                    prevBtn.disabled = true;
                    nextBtn.disabled = (totalSlides <= 1);

                } catch (error) {
                    console.error('PDF error:', error);
                    alert('Could not render PDF. Please try another file.\nError: ' + error.message);
                    resetToEmpty();
                } finally {
                    isRendering = false;
                }
            }

            function resetToEmpty() {
                while (track.firstChild) {
                    track.removeChild(track.firstChild);
                }
                const empty = document.createElement('div');
                empty.className = 'slide empty-state';
                empty.id = 'emptySlide';
                empty.innerHTML = `
                    <i class="fas fa-file-pdf"></i>
                    <h4>Drop a PDF to create flip cards</h4>
                    <p>Odd pages = front · Even pages = back</p>
                    <p style="font-size:0.8rem; margin-top:0.5rem; color:#889bb3;">Click the card to flip it</p>
                `;
                track.appendChild(empty);
                totalSlides = 0;
                currentIndex = 0;
                pageData = [];
                track.style.transform = `translateX(0%)`;
                updateUI();
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                fileInfo.innerHTML = `<i class="far fa-file-pdf"></i> no PDF`;
                fileStatus.textContent = '📄 no file loaded';
                isRendering = false;
            }

            function handleFile(file) {
                if (!file) {
                    alert('No file selected.');
                    return;
                }

                if (file.type !== 'application/pdf') {
                    alert('Please select a valid PDF file.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        await renderPDFPages(e.target.result);
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Error rendering PDF: ' + error.message);
                        resetToEmpty();
                    }
                };
                reader.onerror = function() {
                    alert('Error reading file.');
                    resetToEmpty();
                };
                reader.readAsArrayBuffer(file);
            }

            browseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            dropZone.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) {
                    handleFile(fileInput.files[0]);
                }
                fileInput.value = '';
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type === 'application/pdf') {
                    handleFile(files[0]);
                } else {
                    alert('Please drop a PDF file.');
                }
            });

            document.querySelector('.pdf-carousel').addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            document.querySelector('.pdf-carousel').addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });
            document.querySelector('.pdf-carousel').addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type === 'application/pdf') {
                    handleFile(files[0]);
                } else {
                    alert('Please drop a PDF file.');
                }
            });

            prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
            nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

            document.addEventListener('keydown', (e) => {
                if (totalSlides === 0 || isRendering) return;
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    goToSlide(currentIndex - 1);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    goToSlide(currentIndex + 1);
                }
            });

            let startX = 0,
                isSwiping = false;
            viewport.addEventListener('touchstart', (e) => {
                if (totalSlides === 0 || isRendering) return;
                startX = e.touches[0].clientX;
                isSwiping = true;
            }, { passive: true });
            viewport.addEventListener('touchend', (e) => {
                if (!isSwiping || totalSlides === 0 || isRendering) return;
                isSwiping = false;
                const endX = e.changedTouches[0].clientX;
                const diff = startX - endX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) goToSlide(currentIndex + 1);
                    else goToSlide(currentIndex - 1);
                }
            }, { passive: true });

            let mouseDown = false,
                mouseStartX = 0;
            viewport.addEventListener('mousedown', (e) => {
                if (totalSlides === 0 || isRendering) return;
                mouseDown = true;
                mouseStartX = e.clientX;
                e.preventDefault();
            });
            viewport.addEventListener('mouseup', (e) => {
                if (!mouseDown || totalSlides === 0 || isRendering) return;
                mouseDown = false;
                const diff = mouseStartX - e.clientX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) goToSlide(currentIndex + 1);
                    else goToSlide(currentIndex - 1);
                }
            });
            viewport.addEventListener('mouseleave', () => { mouseDown = false; });

            resetToEmpty();
        })();
    </script>
</body>
</html>
